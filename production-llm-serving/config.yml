databricks:
  host: "https://your-workspace.azuredatabricks.net"  # or .cloud.databricks.com / .gcp.databricks.com
  secrets_scope: "your-secrets-scope"
  token_secret_key: "databricks_token"

model_serving:
  # Name of your deployed provisioned throughput endpoint
  provisioned_endpoint: "my-provisioned-llama4-endpoint"
  # Pay-per-token model name — must be the same underlying model as the PT endpoint
  pay_per_token_model: "databricks-meta-llama-4-maverick"
  # HTTP status codes that trigger fallback to pay-per-token
  fallback_status_codes:
    - 429  # rate limit / capacity exceeded
    - 503  # service unavailable

deployment:
  # Unity Catalog path to the model: catalog.schema.model_name
  entity_name: "system.ai.meta-llama-4-maverick"
  # Model version to deploy (omit or set null to use latest)
  entity_version: null
  # Number of model units to provision (use capacity_deployment.ipynb to estimate)
  provisioned_model_units: 50
  # Allow endpoint to burst beyond provisioned capacity during traffic spikes
  burst_scaling_enabled: true
  # Optional metadata
  description: "Llama 4 Maverick provisioned throughput endpoint"
  tags:
    team: "ml-platform"
    env: "production"
